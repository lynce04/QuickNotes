<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickNotes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">

</head>

<body>
  <div class="container-fluid vh-100 p-0 ">
    <div class="row g-0 h-100" id="mainRow">

      <div  id="sidebar">
        <div class="p-3">
          <h4> QuickNotes </h4>

          <input class="form-control" placeholder="Serach notes...." id="searchInput">

        </div>
        <ul class="list-group list-group-flush" id="noteList"> </ul>



        <div class="border-top p-3 d-flex justify-content-between align-items-center">
          <small id="noteCount">
            0 notes
          </small>
          <button onclick="newNote()" type="button" class="btn btn-warning">+ New Note</button>
          <button id="themeBtn">🎨</button>
        </div>

        <div id="themePanel" class="border-top p-3">
          <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
            <div>

              <label>Color</label>
              <input type="color" id="colorPicker">
            </div>

            <div>
              <label>Image</label>
              <input type="file" id="imagePicker" accept="image/*">
            </div>

            <div>
              <label>Size</label>
              <input type="range" id="fontSizeSlider" min="12" max="24" value="15">
            </div>

            <div>
              <label>Font</label>
              <select id="fontFamilyPicker">
                <option value="sans-serif">Sans-serif</option>
                <option value="serif">Serif</option>
                <option value="monospace">Monospace</option>
                <option value="cursive">Cursive</option>
              </select>
            </div>

                <button id="resetBtn" type="button">Reset</button>
          </div>
        </div>

      </div>


      <div id = "resizer"></div>
      <div id="editor">
        <div class="border-bottom p-3 card text-center  " id="editorInner">
          <small id="editorDate" class="text-body-tertiary"></small>
          <input id="editorTitle" placeholder="Title" class="border border-0 fs-1">
          <textarea id="editorBody" placeholder="start writing" class="border-0 w-100 p-3"></textarea>

          <div class="border-top p-3 d-flex justify-content-between align-items-center">
            <button type="button" id="deleteBtn" class="btn btn-outline-danger btn-sm">Delete</button>
            <button type="button" id="saveBtn" class="btn btn-warning btn-sm fw-bold">save</button>

          </div>

        </div>

      </div>

    </div>

  </div>


  <script src="app.js"></script>
</body>

</html>
